name: Release

# Builds a signed, notarized, stapled DMG and (on a tag) attaches it to a GitHub Release.
# Runs ONLY on a version tag or manual dispatch — never on ordinary pushes — so it can't
# create red runs before the required secrets exist.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload a GitHub Release

jobs:
  release:
    name: Signed notarized DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          xcodebuild -version

      # Import the Developer ID Application cert into an ephemeral keychain so codesign can
      # use it without a UI prompt. The keychain is deleted in the always() cleanup step.
      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Make the ephemeral keychain first in the search list so codesign/xcodebuild find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write notary API key
        env:
          NOTARY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: echo "$NOTARY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive → export → notarize → staple → DMG
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          BUILD_DIR=build/release
          ARCHIVE=$BUILD_DIR/neurosync.xcarchive
          EXPORT_DIR=$BUILD_DIR/export
          APP=$EXPORT_DIR/neurosync.app
          DMG=$BUILD_DIR/neurosync.dmg
          KEY="$RUNNER_TEMP/AuthKey.p8"
          rm -rf "$BUILD_DIR"; mkdir -p "$BUILD_DIR"

          echo "▸ Archive"
          xcodebuild -scheme neurosync -configuration Release \
            -destination 'generic/platform=macOS' -archivePath "$ARCHIVE" archive

          echo "▸ Export (Developer ID)"
          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportOptionsPlist dist/ExportOptions.plist -exportPath "$EXPORT_DIR"

          echo "▸ Verify signature + hardened runtime"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "flags|Authority=Developer ID|TeamIdentifier" || true

          echo "▸ Notarize app"
          ZIP=$BUILD_DIR/neurosync.zip
          ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$APP"

          echo "▸ Build + sign + notarize + staple DMG"
          STAGE=$BUILD_DIR/dmg; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"; ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NeuroSync" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          codesign --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$DMG"

          echo "▸ Gatekeeper check"
          spctl -a -vv -t open --context context:primary-signature "$DMG" || true
          stapler validate "$DMG"
          shasum -a 256 "$DMG"

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurosync-dmg
          path: build/release/neurosync.dmg
          if-no-files-found: error

      - name: Attach DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/release/neurosync.dmg \
            --title "NeuroSync ${GITHUB_REF_NAME}" --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" build/release/neurosync.dmg --clobber

      - name: Clean up ephemeral keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
