name: Release

# Builds a signed, notarized, stapled DMG and (on a tag) attaches it to a GitHub Release.
# Runs ONLY on a version tag or manual dispatch — never on ordinary pushes — so it can't
# create red runs before the required secrets exist.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload a GitHub Release

jobs:
  release:
    name: Signed notarized DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # Fail in 5 seconds with the name of the missing secret, rather than 40 lines into the
      # keychain import with a cryptic openssl error. An unset secret expands to the empty
      # string, which is indistinguishable from a set-but-empty one — both are fatal here.
      - name: Preflight — required secrets are present
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          NOTARY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -uo pipefail
          missing=0
          for name in CERT_P12_BASE64 NOTARY_P8_BASE64 NOTARY_KEY_ID NOTARY_ISSUER_ID; do
            # Sizes only — never the values. A base64 blob under ~100 chars is not a real key.
            n=$(printf '%s' "${!name}" | tr -d '[:space:]' | wc -c | tr -d ' ')
            echo "$name: $n chars"
            if [ "$n" -lt 20 ]; then
              echo "::error::secret for $name is empty or truncated ($n chars) — re-set it with scripts/set-release-secrets.sh"
              missing=1
            fi
          done
          # An empty .p12 password is legal, so this one is reported, not enforced.
          echo "CERT_PASSWORD: $([ -n "$CERT_PASSWORD" ] && echo set || echo "EMPTY (legal, but unusual)")"
          exit $missing

      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          xcodebuild -version

      # Import the Developer ID Application cert into an ephemeral keychain so codesign can
      # use it without a UI prompt. The keychain is deleted in the always() cleanup step.
      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -uo pipefail
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPW="$(uuidgen)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"

          # Decode robustly: strip ALL whitespace first so line-wrapped base64 (macOS `base64 -i`
          # wraps at 76 cols) still decodes. This is the usual cause of a later "invalid parameters".
          CERT=$RUNNER_TEMP/cert.p12
          printf '%s' "$CERT_P12_BASE64" | tr -d '[:space:]' | base64 --decode > "$CERT"
          echo "Decoded .p12: $(wc -c < "$CERT") bytes"; file "$CERT"

          # Validate the blob is a real PKCS12 that opens with the given password — a clear, early
          # failure beats security's cryptic "invalid parameters". Prints only PUBLIC cert subjects.
          if ! openssl pkcs12 -in "$CERT" -nokeys -passin pass:"$CERT_PASSWORD" >/tmp/certs.pem 2>/tmp/ossl.err; then
            echo "::error::DEVELOPER_ID_CERT_P12_BASE64 did not open as a PKCS12 with DEVELOPER_ID_CERT_PASSWORD."
            sed 's/^/openssl: /' /tmp/ossl.err
            exit 1
          fi
          echo "Certificate subjects in the .p12:"
          openssl crl2pkcs7 -nocrl -certfile /tmp/certs.pem 2>/dev/null | openssl pkcs7 -print_certs -noout 2>/dev/null | grep -i "subject=" || \
            grep -i "subject" /tmp/certs.pem || true

          security import "$CERT" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          # Make the ephemeral keychain first in the search list so codesign/xcodebuild find the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "Codesigning identities in the ephemeral keychain:"
          security find-identity -v -p codesigning "$KEYCHAIN"
          if ! security find-identity -v -p codesigning "$KEYCHAIN" | grep -q "Developer ID Application"; then
            echo "::error::No 'Developer ID Application' identity in the imported .p12 — the wrong certificate was exported."
            exit 1
          fi
          rm -f "$CERT" /tmp/certs.pem

      - name: Write notary API key
        env:
          NOTARY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: echo "$NOTARY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive → export → notarize → staple → DMG
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          BUILD_DIR=build/release
          ARCHIVE=$BUILD_DIR/neurosync.xcarchive
          EXPORT_DIR=$BUILD_DIR/export
          APP=$EXPORT_DIR/neurosync.app
          DMG=$BUILD_DIR/neurosync.dmg
          KEY="$RUNNER_TEMP/AuthKey.p8"
          rm -rf "$BUILD_DIR"; mkdir -p "$BUILD_DIR"

          echo "▸ Archive"
          xcodebuild -scheme neurosync -configuration Release \
            -destination 'generic/platform=macOS' -archivePath "$ARCHIVE" archive

          echo "▸ Export (Developer ID)"
          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportOptionsPlist dist/ExportOptions.plist -exportPath "$EXPORT_DIR"

          echo "▸ Verify signature + hardened runtime"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dvv "$APP" 2>&1 | grep -E "flags|Authority=Developer ID|TeamIdentifier" || true

          echo "▸ Notarize app"
          ZIP=$BUILD_DIR/neurosync.zip
          ditto -c -k --keepParent "$APP" "$ZIP"
          xcrun notarytool submit "$ZIP" --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$APP"

          echo "▸ Build + sign + notarize + staple DMG"
          STAGE=$BUILD_DIR/dmg; mkdir -p "$STAGE"
          cp -R "$APP" "$STAGE/"; ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NeuroSync" -srcfolder "$STAGE" -ov -format UDZO "$DMG"
          codesign --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" --key "$KEY" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          xcrun stapler staple "$DMG"

          echo "▸ Gatekeeper check"
          spctl -a -vv -t open --context context:primary-signature "$DMG" || true
          stapler validate "$DMG"
          shasum -a 256 "$DMG"

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: neurosync-dmg
          path: build/release/neurosync.dmg
          if-no-files-found: error

      - name: Attach DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" build/release/neurosync.dmg \
            --title "NeuroSync ${GITHUB_REF_NAME}" --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" build/release/neurosync.dmg --clobber

      - name: Clean up ephemeral keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
